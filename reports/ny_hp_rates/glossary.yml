Utility costs: |
  The expenses a utility incurs to generate, transmit, and distribute electricity — including capital costs (building infrastructure like power plants, transmission lines, and feeders) and operating costs (fuel, maintenance, billing, and administration). Utilities recover these costs from customers through their bills.
Utility bills: |
  The total amount a customer pays the utility each month. A bill is calculated by applying the utility's rates to the customer's usage and connection. It covers the utility's costs of service — generation, transmission, and distribution — plus taxes and policy charges.
Utility rates: |
  The prices charged by the utility, used to calculate customer bills. Rates come in two flavors: fixed charges (dollars per month for being connected to the grid) and volumetric charges (dollars per kWh of energy consumed). Both supply and delivery components have their own rates.
Capital costs: |
  The up-front expenses of building long-lived infrastructure — power plants, transmission lines, substations, and distribution feeders. Utilities recover these costs from customers over the life of the asset, plus a regulated profit margin (return on equity).
Operating costs: |
  The ongoing expenses of running the electric system day-to-day — fuel, maintenance, meter reading, billing, and administration. Unlike capital costs, operating costs are incurred and recovered in the same year.
Cost of service: |
  A customer's "fair share" of the utility's costs — the actual expense the utility incurs to serve that customer. It includes the cost of generating or purchasing electricity (supply), transmitting it over high-voltage lines, and distributing it over local poles and wires. Rate design aims to align what each customer pays (their bill) with their cost of service.
Cost-causation principle: |
  The idea that each customer should pay for the costs they cause. A customer who consumes more energy should pay more for fuel; a customer whose peak demand is higher should pay more for the infrastructure built to meet that peak. Cost-causation is the standard guiding principle behind cost allocation and rate design — though in practice, tracing which customers caused which costs is easier for some costs (like wholesale energy) than others (like a transformer installed twenty years ago).
Embedded Cost of Service study: |
  A formal study filed by the utility in a rate case that allocates the utility's total delivery revenue requirement across customer classes (residential, commercial, industrial). The ECOS uses proxy allocators — peak demand contribution, energy consumption, and customer count — to assign each class its share of transmission and distribution costs. The result determines how much of the utility's costs each class is responsible for; rate design then determines how to collect that amount through bills.
Capacity (infrastructure): |
  The maximum amount of electric current a piece of transmission or distribution equipment — a line, transformer, or substation — can carry safely without overheating or damaging the equipment. When demand approaches an asset's capacity, the utility must either upgrade the asset or build new infrastructure to handle the load.
Capacity costs: |
  The capital cost of an infrastructure project that increases the system's capacity — a new substation, a thicker feeder, additional generation. Capacity costs exist at every level: generation capacity costs (power plants), transmission capacity costs (high-voltage lines and bulk substations), and distribution capacity costs (feeders, transformers, secondary lines). They are driven by peak demand, not total energy consumption.
Sunk costs: |
  Costs that have already been incurred and cannot be recovered or avoided regardless of what customers do. Most transmission and distribution capital and operating costs are sunk — the infrastructure is already built, the maintenance crews are already hired, and these expenses have to be paid for whether customers use a lot of electricity or none at all. Also called embedded costs in utility regulation.
Embedded costs: |
  Costs that are baked into the utility's rate base and must be recovered from customers regardless of future load — the accumulated capital investments, depreciation, return on equity, and fixed operating expenses for infrastructure that already exists. The term comes from utility regulation (as in "Embedded Cost of Service study") and overlaps with sunk costs, though "embedded" emphasizes the cost's presence in the rate base rather than its irreversibility.
Marginal costs: |
  Costs that change based on what customers do — specifically, the additional cost the system incurs when a customer consumes one more unit of electricity. Energy costs are marginal (each kWh burns a little more fuel), generation capacity costs are marginal (peak demand drives the need for power plants), and a small fraction of T&D capacity costs are marginal (load growth triggers new infrastructure projects). Marginal costs are the basis for cost-reflective rate design.
