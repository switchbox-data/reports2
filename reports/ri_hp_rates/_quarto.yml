project:
  type: manuscript
  output-dir: docs
  render:
    - notebooks/analysis.qmd
    - notebooks/cross_subsidy_diagnostics.qmd
    - index.qmd
manuscript:
  article: index.qmd
format:
  html:
    page-layout: article
    smooth-scroll: true
    link-external-window: true
    theme:
      - ../.style/switchbox.scss
    include-in-header: ../.style/notebook-preview.html
    include-after-body: ../.style/switchbox.html
    fig-format: svg
