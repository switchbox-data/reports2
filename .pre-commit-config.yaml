repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: "Whitespace: remove trailing whitespace (trailing-whitespace)"
      - id: end-of-file-fixer
        name: "Whitespace: fix missing newline at end of file (end-of-file-fixer)"
      - id: check-added-large-files
        name: "Git: block files over 600KB (check-added-large-files)"
        args: ["--maxkb=600"]
        exclude: uv.lock
      - id: check-merge-conflict
        name: "Git: detect merge conflict markers (check-merge-conflict)"
      - id: check-case-conflict
        name: "Git: detect filename case conflicts (check-case-conflict)"
      - id: check-toml
        name: TOML syntax checker (check-toml)
      - id: check-json
        name: JSON syntax checker (check-json)
        exclude: ^.devcontainer/devcontainer.json
      - id: pretty-format-json
        name: JSON formatter (pretty-format-json)
        exclude: ^.devcontainer/devcontainer.json
        args: [--autofix, --no-sort-keys]
      - id: check-yaml
        name: YAML syntax checker (check-yaml)
  - repo: https://github.com/instrumentl/pre-commit-just
    rev: v0.1
    hooks:
      - id: format-justfile
        name: Justfile formatter (format-justfile)
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        name: Shell script formatter (shfmt)
        args: ['-w', '-i', '2']
  # yamlfmt: system binary (precompiled from GitHub releases).
  # Install: curl the release tarball for your platform into /usr/local/bin.
  - repo: local
    hooks:
      - id: yamlfmt
        name: YAML formatter (yamlfmt)
        entry: yamlfmt
        language: system
        types: [yaml]
  - repo: local
    hooks:
      - id: dprint
        name: Markdown formatter (dprint)
        entry: dprint fmt
        language: python
        types: [markdown]
        additional_dependencies: [dprint-py]
      - id: ty
        name: Python type checker (ty)
        entry: uv run ty check .
        language: system
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
        name: Python linter (ruff-check)
        args: [--fix]
      - id: ruff-format
        name: Python formatter (ruff-format)
  - repo: https://github.com/etiennebacher/jarl-pre-commit
    rev: 0.4.0
    hooks:
      - id: jarl-check
        name: R linter (jarl-check)
        files: \.(R|r)$
  - repo: https://github.com/posit-dev/air-pre-commit
    rev: 0.8.2
    hooks:
      - id: air-format
        name: R formatter (air-format)
        files: \.(R|r)$
  - repo: https://github.com/jolars/panache
    rev: v2.21.0
    hooks:
      - id: panache-lint
        name: Quarto linter (panache-lint)
        files: \.qmd$
        exclude: ^docs/
    # panache-format disabled: two remaining idempotency bugs as of v2.21.0:
    # 1. Footnote continuation indentation grows by 4 spaces on each run.
    # 2. Multi-line #| chunk options (e.g. long fig-cap) lose continuation
    #    lines on second pass, silently truncating figure captions.
    # Original bugs #46, #47, #72 are all fixed. Re-enable when these are resolved.
    # - id: panache-format
    #   name: Quarto formatter (panache-format)
    #   files: \.qmd$
    #   exclude: ^docs/
