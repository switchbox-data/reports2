# Markdown flavor and line width
flavor = "quarto"
line-width = 120
line-ending = "auto"

# Formatting style
[style]
wrap = "reflow"

# External code formatters (opt-in)
# No python formatter: ruff via panache breaks Quarto's #| chunk options
# by adding a space (#| → # |), which Quarto can't parse. Python code in
# .qmd files must be formatted manually or via editor integration.
# See https://github.com/jolars/panache/issues/46 for the built-in preset bug.
[formatters]
r = "air"                   # Built-in preset
yaml = "yamlfmt"            # Formats both code blocks AND frontmatter

[formatters.air]
args = ["format", "--preset=tidyverse"] # cmd and stdin inherited from built-in

# External code linters
[linters]
r = "jarl" # Enable R linting
