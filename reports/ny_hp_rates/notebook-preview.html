<!--
  Notebook preview style overrides for ny_hp_rates.

  Quarto's manuscript project sets produce-source-notebook=true on all
  non-article .qmd files, stripping code block classes (.python, .cell-code).
  Without these classes, Pandoc's syntax highlighter and Quarto's fold filter
  are both bypassed. This file provides all three features via CSS + JS:
    1. Collapsible code, hidden by default (JS toggle buttons)
    2. SF Mono font at a smaller size (CSS)
    3. Python syntax highlighting (highlight.js)

  Included via _quarto.yml `include-in-header`. Scoped to .quarto-notebook
  so it only affects notebook preview pages, not the main article.
-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

<style>
/* ── Hide Jupyter cell decorators (In [N]:) ─────────────────────────── */
.quarto-notebook .cell-container .cell-decorator {
  display: none;
}

/* ── Code block font: SF Mono, smaller size ──────────────────────────── */
.quarto-notebook .cell-container .cell pre code {
  font-family: "SFMono", "SF Mono", SFMono-Regular, ui-monospace, monospace;
  font-size: 0.8em;
  line-height: 1.5;
}

/* ── Collapsible code: hidden by default ─────────────────────────────── */
.quarto-notebook .cell-container .cell > pre {
  display: none;
}

.quarto-notebook .cell-container .cell > .code-toggle {
  cursor: pointer;
  display: inline-block;
  padding: 2px 8px;
  margin-bottom: 4px;
  font-family: "SFMono", "SF Mono", SFMono-Regular, ui-monospace, monospace;
  font-size: 0.75em;
  color: #6c757d;
  background: #f8f9fa;
  border: 1px solid #dee2e6;
  border-radius: 4px;
  user-select: none;
}
.quarto-notebook .cell-container .cell > .code-toggle:hover {
  background: #e9ecef;
  color: #495057;
}
.quarto-notebook .cell-container .cell > .code-toggle::before {
  content: "▶ ";
}
.quarto-notebook .cell-container .cell.code-visible > .code-toggle::before {
  content: "▼ ";
}
.quarto-notebook .cell-container .cell.code-visible > pre {
  display: block;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var nb = document.querySelector(".quarto-notebook");
  if (!nb) return;

  nb.querySelectorAll(".cell-container .cell[data-execution_count]").forEach(function (cell) {
    var pre = cell.querySelector("pre");
    if (!pre) return;
    var code = pre.querySelector("code");
    if (!code) return;

    code.classList.add("language-python");
    hljs.highlightElement(code);

    var toggle = document.createElement("span");
    toggle.className = "code-toggle";
    toggle.textContent = "Show code";
    toggle.addEventListener("click", function () {
      cell.classList.toggle("code-visible");
      toggle.textContent = cell.classList.contains("code-visible")
        ? "Hide code"
        : "Show code";
    });
    cell.insertBefore(toggle, pre);
  });
});
</script>
