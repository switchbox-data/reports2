Headroom: |
  The gap between a feeder's peak load and its normal capacity rating, expressed as a percentage.

  A feeder at 80% of capacity has 20% headroom — room for load to grow 20% before the feeder is fully loaded.
Bill Alignment Test: |
  Framework (Simeone et al. 2023) that compares what each customer pays in delivery charges to their allocated cost of service. A positive BAT value means the customer is overpaying; a negative value means underpaying.
Cross-subsidy: |
  When one group of customers pays more (or less) than their cost of service, the difference is effectively transferred to other customers. The overpaying group cross-subsidizes the underpaying group.
Marginal cost: |
  The forward-looking cost of serving the next unit of electricity — the incremental cost of generation, transmission, and distribution capacity needed to meet one additional kWh or kW of demand.
Economic burden: |
  A customer's total marginal cost of service — the sum of hourly marginal costs weighted by that customer's hourly consumption. Used in the Bill Alignment Test to measure what a customer "should" pay before residual allocation.
Residual: |
  The gap between a utility's total revenue requirement and the revenue that marginal-cost pricing alone would recover. It reflects embedded (sunk) costs — depreciation, carrying charges, O&M — that are not captured by forward-looking marginal costs.
Revenue requirement: |
  The total amount of revenue a utility is authorized to collect from ratepayers in a given year, as established in the rate case. Covers all costs: generation, transmission, distribution, return on equity, taxes, and policy charges.
EPMC: |
  Equi-proportional marginal cost — a method for allocating the residual so that each customer's share is proportional to their share of total system marginal costs. Equivalent to scaling all marginal-cost-based rates by a uniform factor until the revenue requirement is met.
Energy burden: |
  The percentage of a household's annual income spent on energy bills. A household is considered energy-burdened when this share exceeds 6%.
Cost of service: |
  The total cost a utility incurs to serve a customer or customer class — marginal cost (economic burden) plus the customer's allocated share of the residual.
