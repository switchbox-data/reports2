Utility costs: |
  The expenses a utility incurs to generate, transmit, and distribute electricity — including capital costs (building infrastructure like power plants, transmission lines, and feeders) and operating costs (fuel, maintenance, billing, and administration). Utilities recover these costs from customers through their bills.
Utility bills: |
  The total amount a customer pays the utility each month. A bill is calculated by applying the utility's rates to the customer's usage and connection. It covers the utility's costs of service — generation, transmission, and distribution — plus taxes and policy charges.
Utility rates: |
  The prices charged by the utility, used to calculate customer bills. Rates come in two flavors: fixed charges (dollars per month for being connected to the grid) and volumetric charges (dollars per kWh of energy consumed). Both supply and delivery components have their own rates.
Capital costs: |
  The up-front expenses of building long-lived infrastructure — power plants, transmission lines, substations, and distribution feeders. Utilities recover these costs from customers over the life of the asset, plus a regulated profit margin (return on equity).
Operating costs: |
  The ongoing expenses of running the electric system day-to-day — fuel, maintenance, meter reading, billing, and administration. Unlike capital costs, operating costs are incurred and recovered in the same year.
Supply costs: |
  The costs a utility incurs to generate or purchase the electricity its customers consume — fuel, wholesale market purchases, power plant operations and maintenance, and the capital cost of generation assets. Supply costs vary hour by hour with demand and the mix of generators running, and are recovered through the supply side of a customer's bill (priced per kWh).
Delivery costs: |
  The costs a utility incurs to move electricity from where it is generated to where it is consumed — the transmission lines, substations, and distribution feeders that make up the "poles and wires" network. Delivery costs are dominated by the capital cost of this infrastructure, most of which is already built and must be paid for whether a customer uses a lot of electricity or none at all. They are recovered through the delivery side of a customer's bill, today via a combination of fixed and volumetric charges.
Cost of service: |
  A customer's "fair share" of the utility's costs — the actual expense the utility incurs to serve that customer. It includes the cost of generating or purchasing electricity (supply), transmitting it over high-voltage lines, and distributing it over local poles and wires. Rate design aims to align what each customer pays (their bill) with their cost of service.
Cost-causation principle: |
  The idea that each customer should pay for the costs they cause. A customer who consumes more energy should pay more for fuel; a customer whose peak demand is higher should pay more for the infrastructure built to meet that peak. Cost-causation is the standard guiding principle behind cost allocation and rate design — though in practice, tracing which customers caused which costs is easier for some costs (like wholesale energy) than others (like a transformer installed twenty years ago).
Embedded Cost of Service study: |
  A formal study filed by the utility in a rate case that allocates the utility's total delivery revenue requirement across customer classes (residential, commercial, industrial). The ECOS uses proxy allocators — peak demand contribution, energy consumption, and customer count — to assign each class its share of transmission and distribution costs. The result determines how much of the utility's costs each class is responsible for; rate design then determines how to collect that amount through bills.
Capacity (infrastructure): |
  The maximum amount of electric current a piece of transmission or distribution equipment — a line, transformer, or substation — can carry safely without overheating or damaging the equipment. When demand approaches an asset's capacity, the utility must either upgrade the asset or build new infrastructure to handle the load.
Peak demand: |
  The hours when electricity consumption is at its highest — not just across the bulk power grid (the "system peak," when statewide or regional load is greatest), but also at the level of individual transmission lines, substations, and distribution feeders serving a particular neighborhood or customer (a "local peak"). System peaks in New York typically fall on hot summer afternoons when air conditioning loads surge, and increasingly on cold winter mornings as electric heating grows; local peaks may occur at different times depending on which customers a given line or transformer serves. A customer's incremental usage during any peak hour — system or local — contributes to the need to upgrade that piece of infrastructure, which is why peak demand is the driver of capacity costs. Usage during off-peak hours generally does not.
Capacity costs: |
  The capital cost of an infrastructure project that increases the system's capacity — a new substation, a thicker feeder, additional generation. Capacity costs exist at every level: generation capacity costs (power plants), transmission capacity costs (high-voltage lines and bulk substations), and distribution capacity costs (feeders, transformers, secondary lines). They are driven by peak demand, not total energy consumption.
Sunk costs: |
  Costs that have already been incurred and cannot be recovered or avoided regardless of what customers do. Most transmission and distribution capital and operating costs are sunk — the infrastructure is already built, the maintenance crews are already hired, and these expenses have to be paid for whether customers use a lot of electricity or none at all. Also called embedded costs in utility regulation.
Embedded costs: |
  Costs that are baked into the utility's rate base and must be recovered from customers regardless of future load — the accumulated capital investments, depreciation, return on equity, and fixed operating expenses for infrastructure that already exists. The term comes from utility regulation (as in "Embedded Cost of Service study") and overlaps with sunk costs, though "embedded" emphasizes the cost's presence in the rate base rather than its irreversibility.
Marginal costs: |
  Costs that change based on what customers do — specifically, the additional cost the system incurs when a customer consumes one more unit of electricity. Energy costs are marginal (each kWh burns a little more fuel), generation capacity costs are marginal (peak demand drives the need for power plants), and a small fraction of T&D capacity costs are marginal (load growth triggers new infrastructure projects). Marginal costs are the basis for cost-reflective rate design.
Marginal energy costs: |
  The additional cost the power system incurs when a customer consumes one more kWh, driven by the fuel and operating costs of the generator that ends up supplying that incremental kWh. Marginal energy costs vary hour by hour with demand and the mix of generators running: they are low when abundant renewables are on the grid or demand is slack, and high when expensive peaker plants are running to meet peak load. They are the short-run marginal cost of electricity supply, and the primary source of hour-by-hour price variation in a cost-reflective supply rate.
Marginal capacity costs: |
  The additional cost the power system incurs to expand its capacity — in generation (new power plants), transmission (new high-voltage lines), or distribution (new substations and feeders) — in response to growing peak demand. Marginal capacity costs are driven by load during the hours when the relevant asset is most strained and are effectively zero at other times. They represent the long-run marginal cost of serving additional demand, and are the economic signal a cost-reflective delivery rate must reflect to discourage consumption during peak hours.
Cost allocation: |
  The regulatory process of dividing a utility's total revenue requirement among the groups of customers it serves, in proportion to each group's cost of service. Utilities routinely perform cost allocation across broad customer classes — residential, commercial, industrial — during rate cases. But the same process can be applied to subclasses within a class (e.g., heat pump customers within the residential class), if the regulator creates a separate rate class for that group. Without cost allocation at the subclass level, the utility has no way to know whether it is over- or under-collecting from any particular group of residential customers.
Fixed charges: |
  A flat dollar amount per month that a customer pays regardless of how much electricity they use. Fixed charges appear only on the delivery side of the bill and typically cover customer-related costs — meters, service lines, billing, and meter reading.
Volumetric charges: |
  A price per kWh of electricity consumed. Volumetric charges appear on both sides of the bill — supply and delivery — and come in two flavors: flat (the same price at all hours) and time-varying (prices that change by season, time of day, or both).
Flat volumetric rates: |
  Volumetric rates that charge the same price per kWh at all hours. Most residential electricity rates in the U.S. are flat: a customer pays the same per-kWh price whether they consume electricity at 3 a.m. or 3 p.m., in January or July.
Time-varying volumetric rates: |
  Volumetric rates where the price per kWh changes over time — by season (higher in summer, lower in winter), by time of day (higher during afternoon peaks, lower overnight), or both. Time-varying rates give customers a price signal that better reflects the actual cost of electricity at different hours, rewarding those who shift consumption to cheaper periods.
Seasonal rate: |
  A volumetric rate whose per-kWh price differs between summer and winter but is constant within each season. Seasonal rates are designed to recover more revenue in the months when serving customers is more expensive, and less in months when it is cheaper. Traditionally that means higher prices in summer, when system peaks and capacity costs are concentrated. The seasonal heat pump rates designed in this report invert that pattern — they lower winter prices — because heat pump customers consume disproportionately in winter, and their cost of service does not rise in proportion to that winter consumption.
Time-of-use rate (TOU): |
  A volumetric rate whose per-kWh price varies by time of day, typically higher during an "on-peak" window when the grid is most strained and electricity is most expensive to produce, and lower during "off-peak" hours when it is cheaper. Prices are set in advance rather than varying in real time. TOU rates can be combined with seasonal pricing to produce different on-peak and off-peak prices in different seasons. A well-designed TOU rate rewards customers who can shift consumption to off-peak hours and discourages load during the hours that drive capacity investment.
Cross-subsidy: |
  A systematic transfer of money between groups of utility customers that happens when rates collect more than one group's cost of service while collecting less than another's. The overpaying group effectively subsidizes the underpayers through higher bills. In this report, we focus on the cross-subsidy from heat pump customers — who are overcharged for delivery under flat volumetric rates — to customers who heat with fossil fuels, who are correspondingly undercharged.
Fairness (rate design): |
  The principle that each group of customers should pay, in total, an amount that matches their cost of service — no more, no less. A rate that achieves fairness is cost-based: heat pump customers are not overcharged to subsidize fossil heating customers, and vice versa. Fairness is about the right _amount_; it says nothing about _when_ prices are high or low.
Efficiency (rate design): |
  The principle that prices should reflect costs as they happen — higher when electricity is expensive to produce or the grid is strained, lower when it is cheap and abundant. A rate that achieves efficiency is cost-reflective: it gives customers an incentive to shift consumption to cheaper hours, reducing waste in both generation (consumption efficiency) and infrastructure investment (investment efficiency). Efficiency is about the right _signal_; it says nothing about whether the total collected from each group is fair.
Cost-based rate: |
  A rate that bills each group of customers in line with their cost of service — the amount the utility actually spends to serve them. Under a cost-based rate, the average customer in each group neither overpays nor underpays relative to what it costs to serve their group. Cost-based rates solve the fairness problem but do not necessarily send price signals that vary over time.
Cost-reflective rate: |
  A rate that exposes customers to prices tracking marginal costs over time — higher prices when electricity is expensive to produce or when the grid is strained, lower prices when it is cheap and abundant. Cost-reflective rates solve the efficiency problem by giving customers an incentive to shift consumption to cheaper hours, but do not necessarily ensure that each group pays the right total amount.
Load shifting: |
  A customer's practice of moving electricity consumption from one time of day to another without reducing total use — for example, pre-heating a home with a heat pump during low-cost off-peak hours so less heating is needed during high-cost on-peak hours. On a time-of-use rate, load shifting lets customers lower their bills; at the system level, it reduces peak demand and the need for new grid capacity.
Demand flexibility: |
  The ability of a customer's electric load to respond to price signals, grid conditions, or utility control programs — either shifting consumption in time (load shifting), reducing it temporarily (load shedding), or both. Demand flexibility is enabled by smart equipment like heat pumps, water heaters, EV chargers, and batteries that can be programmed or remotely controlled. In this report, we model a simple form of demand flexibility: heat pump customers shifting a portion of their on-peak consumption to off-peak hours in response to time-of-use rates.
Revenue requirement: |
  The total amount of money a utility is authorized to collect from a customer class (or subclass) over a given period, as determined during a rate case. The revenue requirement is set to match the group's cost of service: the utility designs rates so that, when applied to the group's expected usage, the resulting bills add up to the revenue requirement. If the revenue requirement is set too high, the group overpays; if too low, it underpays and other customers make up the difference.
Rate design: |
  The process of choosing the specific rate structure — the mix of fixed charges, volumetric charges, demand charges, and time-varying prices — used to collect a customer class's revenue requirement. Many different rate designs can collect the same total revenue, but they differ in their secondary effects: on equity across income levels, on economic efficiency, on incentives for conservation or distributed generation, and on ease of implementation. Rate design is always downstream of cost allocation: the cost allocation determines how much to collect; the rate design determines how.
Rate class: |
  A distinct group of utility customers who share a common tariff — the same set of rates, charges, and billing rules. Utilities maintain separate rate classes for residential, commercial, and industrial customers, each with its own revenue requirement and rate design. Creating a new rate class (e.g., for heat pump customers) is the mechanism by which a utility begins to track a subclass's cost of service and collect revenue that matches it, rather than lumping the subclass in with all other residential customers.
Default rates: |
  The electric supply and delivery rates a utility's customers are automatically enrolled in unless they opt into a different tariff. Default rates are the basis of comparison throughout this report — the counterfactual against which the heat pump rates we design are measured. For most New York State utilities (National Grid, NYSEG, RG&E, Central Hudson), the default residential rate is a flat volumetric rate: the same price per kWh at all hours and seasons. The exceptions are PSEG Long Island, which has a default seasonal time-of-use rate, and Con Edison and Orange & Rockland, which have a default seasonal tiered rate.
Electric resistance heating: |
  A class of electric heating equipment — baseboard heaters, electric furnaces, space heaters — that converts electricity directly into heat at roughly 100% efficiency. Electric resistance uses two to three times more electricity to deliver the same amount of heat as a modern heat pump, making it comparatively expensive to operate. In this report, electric resistance customers are one of three primary heating populations we analyze, alongside heat pump customers and fossil-fuel-heated customers — and, like heat pump customers, they are overcharged for delivery under today's flat volumetric rates.
Energy burden: |
  The share of a household's annual income spent on energy — electricity, natural gas, delivered fuels like heating oil and propane, and the taxes and fees tied to those bills. A household is commonly considered "highly energy burdened" when this share exceeds 6%, the threshold used in this report. Energy burden is one of the most widely used indicators of energy affordability stress, particularly for low- and moderate-income households.
