Costs: |
  The expenses a power sector companies incur to generate, transmit, and distribute electricity, including capital costs and operating costs.
Bills: |
  The total amount a customer pays each month in order to cover their share of supply and delivery costs.
Rates: |
  The regulated prices used to calculate customer bills. Includes fixed and volumetric charges.
Capital costs: |
  The up-front expenses of building long-lived generation, transmission, and distribution infrastructure. Utilities recover these costs from customers over the life of the asset, plus a regulated profit margin (return on equity).
Operating costs: |
  The ongoing expenses of running and maintaining the electric grid day-to-day. Operating costs recovered from customers in the same year they are incurred.
Supply costs: |
  The cost to build and maintain power plants, renewables, and batteries, and to operate them to generate electricity. Dominated by energy costs, which vary hour by hour with demand and the mix of generators running.
Delivery costs: |
  The cost to build, operate, and maintain the transmission and distribution network that delivers electricity to customers.
Cost of service: |
  The costs associated with generating and delivering electricity to a particular customer or customer class. A customer's _delivery_ cost-of-service is their fair share of delivery costs; _supply_ cost-of-service is their share of supply costs.
Cost-causation principle: |
  The idea that utility costs should be paid for by the customers that cause them: the cost to generate electricity should be paid by those who consume it, the cost to build infrastructure to meet peak demand should be borne by customers who use the network during peak hours.
Capacity (infrastructure): |
  The maximum electric current a piece of transmission or distribution equipment — a line, transformer, or substation — can carry safely without damaging the equipment. When demand approaches an asset's capacity, the utility must either upgrade the it, or build new infrastructure to handle the load.
Peak hours: |
  The hours in a year when a particular infrastructure component—be it a distribution line, tranmission line, or the grid as a whole—experiences peak demand. If component is at capacity, usage during these hours triggers the need for upgrades, which drives delivery costs up.
Peak demand: |
  The maximum current served by a particular electrical infrastructure component during a specified time period, usually a season or year.
Cost allocation: |
  The regulatory process of dividing a utility's total revenue requirement among the groups of customers it serves, in proportion to each group's cost of service. Typically applied to broad customer classes (residential, commercial, etc.); can also be performed for groups _within_ a class (e.g. heat pump customers).
Fixed charges: |
  A flat dollar amount per month that a customer pays regardless of how much electricity they use.
Volumetric charges: |
  A price per kWh of electricity consumed (e.g. 10 ¢/kWh). Can be used to pay for supply or delivery costs.
Flat volumetric rates: |
  Volumetric rates that charge the same price per kWh at all hours and seasons. Most default residential electricity rates in the U.S. are flat.
Time-varying volumetric rates: |
  Volumetric rates where the price per kWh changes over time. Examples include seasonal rates and time-of-use rates.
Seasonal rate: |
  A volumetric rate whose per-kWh price differs between summer and winter but is constant within each season.
Time-of-use (TOU) rates: |
  A volumetric rate whose per-kWh price varies by time of day, typically higher during an "on-peak" window when the grid is more likely to be strained and electricity is most expensive to produce, and lower during "off-peak" hours.
Cross-subsidy: |
  The systematic transfer of money between groups of utility customers. Occurs when rates overcharge one group of customers relative to their cost of service while undercharging another group.
Fairness problem: |
  When the principle that a customer group's bills should match their overall cost of service is violated.
Efficiency problem: |
  When the principle that rates should reflect underlying costs—rising when supply or delivery costs are high and falling when they are low—is violated.
Cost-based rate: |
  A rate that bills a group of customers in line with their cost of service. Cost-based rates solve the fairness problem: the average customer in the group, and the group as a whole, neither overpays nor underpays relative to what it costs to serve them.
Cost-reflective rate: |
  A rate with prices that track underlying supply and delivery costs. Cost-reflective rates solve the efficiency problem by giving customers an incentive to shift consumption to hours with lower costs, but they don't guarantee that each group pays their fair share of these costs.
Load shifting: |
  The practice of moving electricity consumption from one time of day to another without reducing total use, typically in pursuit of lower prices. Incentivized by TOU and other time-varying rates.
Revenue requirement: |
  The total amount of revenue a utility is authorized to collect from a customer class (or subclass) over a given period, in order to cover its delivery costs. Determined during a rate case.
Rate design: |
  The process of choosing the specific rate structure — the mix of fixed charges, volumetric charges, demand charges, and time-varying prices — used to calculate the bills of a particular group of customers. Many different rate designs can collect the same total revenue, but they differ in their secondary effects.
Default rates: |
  The electric supply and delivery rates a utility's customers are automatically enrolled in.
Electric resistance heating: |
  A class of electric heating equipment — baseboard heaters, electric furnaces, space heaters — that converts electricity directly into heat by running a current through a resistive element.
Energy burden: |
  The share of a household's annual income spent on home energy bills — electricity, natural gas, delivered fuels. A widely used indicators of energy affordability stress.
Bill Alignment Test: |
  Analytical framework that compares what each customer pays bills to their allocated cost of service. Used to measure cross-subsidies between customer groups.
Marginal costs: |
  The costs of generating or delivering the next unit of electricity. In other words, supply or delivery costs that are caused by customers choosing to consume an additional kWh at particular times.
Capacity costs: |
  The capital cost of an infrastructure project that increases the grid's capacity. Capacity costs are a kind of delivery cost, and they exist at every level of the grid: generation capacity costs (power plants), transmission capacity costs (high-voltage lines and bulk substations), and distribution capacity costs (feeders, transformers, secondary lines).
Embedded costs: |
  Costs that that have already been incurred, and must be recovered from customers regardless of how much customer electricity they use, or when they use it. Mostly consists of the delivery costs associated with T&D infrastructure that has already been built.
Marginal energy costs: |
  The operating cost of generating an additional kWh of electricity at a particular time. Marginal energy costs vary hour by hour with demand and the mix of generators running: they are low when abundant renewables are on the grid or demand is slack, and high when expensive peaker plants are running to meet peak load.
Marginal generation capacity costs: |
  The capacity cost associated with triggering the construction of a new megawatt of generation capacity at a particular time. Zero most hours of the year, and high during system-wide peak hours.
Marginal T&D capacity costs: |
  The capacity cost associated with triggering the construction of a new megawatt of transmission or distribution capacity at a particular time. Zero most hours of the year, and high during peak hours for the infrastructure component that is at capacity.
Economic burden: |
  A customer's total marginal cost of service: the sum of their hourly consumption multiplied by hourly marginal energy and T&D capacity costs, during an entire year.
Residual: |
  The gap between a utility's total revenue requirement and the revenue that marginal-cost pricing alone would recover. It reflects embedded costs — depreciation, carrying charges, O&M — that are not captured by forward-looking marginal costs.
